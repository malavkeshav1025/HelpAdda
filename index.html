<!DOCTYPE html>
<html>
<head>
  <title>HelpAdda</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #4CAF50, #00c6ff);
      color: #333;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      color: white;
      position: sticky;
      top: 0;
    }

    .logo {
      font-weight: bold;
      font-size: 22px;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px;
      color: white;
      animation: fadeUp 1s ease;
    }

    .hero h1 {
      font-size: 32px;
    }

    .hero p {
      margin-top: 10px;
      opacity: 0.9;
    }

    /* FEATURES */
    .features {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 30px;
    }

    .feature {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      margin: 10px;
      padding: 20px;
      border-radius: 15px;
      width: 200px;
      text-align: center;
      color: white;
      transition: 0.3s;
    }

    .feature:hover {
      transform: translateY(-10px);
      background: rgba(255,255,255,0.3);
    }

    /* FORM */
    .form-section {
      text-align: center;
      padding: 40px 20px;
    }

    .box {
      background: white;
      margin: auto;
      width: 90%;
      max-width: 420px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      animation: fadeUp 1s ease;
    }

    iframe {
      width: 100%;
      height: 520px;
      border: none;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      color: white;
      font-size: 12px;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <div class="logo">HelpAdda</div>
    <div>Fast • Simple • Reliable</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Aapki Har Need Ka Solution 💡</h1>
    <p>Bas batao kya chahiye, baaki HelpAdda sambhal lega 🚀</p>
  </div>

  <!-- FEATURES -->
  <div class="features">
    <div class="feature">⚡ Fast Response</div>
    <div class="feature">💼 Trusted Work</div>
    <div class="feature">💰 Budget Friendly</div>
  </div>

  <!-- FORM -->
  <div class="form-section">
    <h2 style="color:white;">🚀 Apni Need Submit Kare</h2>

    <div class="box">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe0UX_pG66nqnnF8pPFXrG0VQB2Ycrx3E129XbdrIz2maP0MQ/viewform?usp=publish-editor"></iframe>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 HelpAdda | Made with ❤️
  </footer>

</body>
</html>
